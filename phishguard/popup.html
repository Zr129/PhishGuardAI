<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app">

    <header class="header">
        <div class="brand">
            <span class="shield" id="shield-icon">🛡️</span>
            <span class="brand-name">PhishGuard</span>
        </div>
        <div class="header-right">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">🌙</button>
            <div id="status" class="pill idle">IDLE</div>
        </div>
    </header>

    <section class="site-card">
        <div class="site-row">
            <div>
                <p class="eyebrow">Current website</p>
                <p class="domain" id="current-domain">Analysing...</p>
            </div>
            <div class="risk-badge-wrap">
                <svg class="risk-ring" viewBox="0 0 36 36" id="risk-ring">
                    <circle class="ring-bg" cx="18" cy="18" r="15.9"/>
                    <circle class="ring-fill" id="ring-fill" cx="18" cy="18" r="15.9"
                            stroke-dasharray="0 100" stroke-dashoffset="25"/>
                </svg>
                <span class="risk-pct" id="risk-pct">—</span>
            </div>
        </div>
        <div class="bar-wrap">
            <div class="bar-track">
                <div class="bar-fill" id="bar-fill"></div>
            </div>
            <span class="bar-label" id="bar-label">Scanning...</span>
        </div>
    </section>

    <section class="flags-section">
        <div class="section-header">
            <span class="eyebrow">Security flags</span>
            <span class="flag-count" id="flag-count"></span>
        </div>
        <div id="flags" class="flags-list"></div>
        <button class="show-more" id="show-more" style="display:none">Show all flags</button>
    </section>

    <footer class="footer">
        <span id="analysis-time"></span>
        <span>Real-time protection active</span>
    </footer>

</div>
<script src="popup.js"></script>
</body>
</html>
