<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
<div class="app-container">

    <!-- HEADER -->
    <header class="header">
        <div class="brand">
            <span class="shield-icon">🛡️</span>
            <h1 class="title">PhishGuard</h1>
        </div>

        <div class="header-right">
            <button id="theme-toggle" class="theme-btn">🌙</button>
            <div id="status" class="status-pill idle">IDLE</div>
        </div>
    </header>

    <!-- SITE -->
    <section class="site-info">
        <p class="label">Current Website</p>
        <h2 id="current-domain">Analyzing...</h2>

        <div class="confidence-bar-container">
            <div id="confidence-fill" class="confidence-fill"></div>
        </div>

        <span id="confidence" class="confidence-text">Risk: 0%</span>
    </section>

    <!-- ALWAYS VISIBLE REASONS -->
    <section class="analysis-section">
        <p class="label">Security Report</p>
        <div id="reasons" class="reasons-list"></div>
    </section>

    <footer class="footer">
        <p>Real-time protection active</p>
    </footer>

</div>

<script src="popup.js"></script>
</body>
</html>
