<!DOCTYPE html>
<html>
<head>
    <title>PhishGuard</title>

    <style>
        body {
            font-family: Arial;
            width: 260px;
            padding: 12px;
            background-color: #f5f5f5;
        }

        #status {
            font-weight: bold;
            font-size: 18px;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 10px;
            color: white;
        }

        #confidence {
            text-align: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        #reasons {
            font-size: 13px;
        }

        .reason {
            background: white;
            padding: 6px;
            margin-bottom: 6px;
            border-radius: 5px;
            border-left: 4px solid #ccc;
        }

        .high {
            border-left-color: red;
        }

        .medium {
            border-left-color: orange;
        }

        .low {
            border-left-color: green;
        }

        #title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>

    <div id="title">PhishGuard</div>

    <div id="status">Checking...</div>

    <div id="confidence"></div>

    <div id="reasons"></div>

    <script src="popup.js"></script>

</body>
</html>
