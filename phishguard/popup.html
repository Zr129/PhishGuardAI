<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app">

    <!-- ── Main view ──────────────────────────────────────── -->
    <div id="view-main">

        <header class="header">
            <div class="brand">
                <svg id="shield-icon" class="brand-shield" viewBox="0 0 20 20" fill="none">
                    <path d="M10 2L3 5v5c0 4.418 3.134 8.545 7 9.5C13.866 18.545 17 14.418 17 10V5L10 2z"
                          fill="currentColor" opacity="0.18"/>
                    <path d="M10 2L3 5v5c0 4.418 3.134 8.545 7 9.5C13.866 18.545 17 14.418 17 10V5L10 2z"
                          stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                    <path d="M7 10l2 2 4-4" stroke="currentColor" stroke-width="1.4"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="brand-name">PhishGuard</span>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme">
                    <svg id="icon-sun" class="btn-icon" viewBox="0 0 20 20" fill="none" style="display:none">
                        <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.4"/>
                        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"
                              stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                    <svg id="icon-moon" class="btn-icon" viewBox="0 0 20 20" fill="none">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
                              stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                </button>
                <button id="settings-btn" class="icon-btn" aria-label="Settings">
                                        <svg class="btn-icon" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="128" cy="128" r="40" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/>
                        <path d="M41.43,178.09A99.14,99.14,0,0,1,31.36,153.8l16.78-21a81.59,81.59,0,0,1,0-9.64l-16.77-21a99.43,99.43,0,0,1,10.05-24.3l26.71-3a81,81,0,0,1,6.81-6.81l3-26.7A99.14,99.14,0,0,1,102.2,31.36l21,16.78a81.59,81.59,0,0,1,9.64,0l21-16.77a99.43,99.43,0,0,1,24.3,10.05l3,26.71a81,81,0,0,1,6.81,6.81l26.7,3a99.14,99.14,0,0,1,10.07,24.29l-16.78,21a81.59,81.59,0,0,1,0,9.64l16.77,21a99.43,99.43,0,0,1-10,24.3l-26.71,3a81,81,0,0,1-6.81,6.81l-3,26.7a99.14,99.14,0,0,1-24.29,10.07l-21-16.78a81.59,81.59,0,0,1-9.64,0l-21,16.77a99.43,99.43,0,0,1-24.3-10l-3-26.71a81,81,0,0,1-6.81-6.81Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/>
                    </svg>
                </button>
                <div id="status" class="pill idle">Idle</div>
            </div>
        </header>

        <!-- ── Verdict hero card ───────────────────────────── -->
        <div class="verdict-hero idle" id="verdict-hero">
            <!-- Hidden ring element for JS compatibility -->
            <circle id="ring-fill" style="display:none"/>

            <div class="hero-top">
                <div class="hero-badge">
                    <span class="hero-icon" id="verdict-icon"></span>
                    <span class="hero-verdict" id="verdict-label">Analysing</span>
                </div>
                <span class="hero-pct" id="risk-pct">—</span>
            </div>

            <div class="hero-domain" id="current-domain">Scanning...</div>
            <div class="hero-url" id="current-url"></div>

            <div class="hero-foot">
                <div class="hero-bar-track">
                    <div class="hero-bar-fill" id="bar-fill"></div>
                </div>
                <div class="hero-meta">
                    <span id="bar-label">Initialising protection...</span>
                    <span id="analysis-time"></span>
                </div>
            </div>
        </div>

        <!-- ── Quick actions ───────────────────────────────── -->
        <div class="quick-actions" id="quick-actions" style="display:none">
            <button class="quick-btn trust" id="btn-trust">
                <svg viewBox="0 0 16 16" fill="none" class="qbtn-icon">
                    <path d="M8 1L2 3.5v4C2 11 4.667 13.833 8 14.5 11.333 13.833 14 11 14 7.5v-4L8 1z"
                          stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                    <path d="M5.5 8l2 2 3-3" stroke="currentColor" stroke-width="1.3"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span id="btn-trust-label">Trust this site</span>
            </button>
            <button class="quick-btn block-btn" id="btn-block">
                <svg viewBox="0 0 16 16" fill="none" class="qbtn-icon">
                    <circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M5 5l6 6M11 5l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                </svg>
                <span id="btn-block-label">Block this site</span>
            </button>
        </div>

        <!-- ── Detection flags ─────────────────────────────── -->
        <section class="flags-section">
            <div class="section-header">
                <span class="section-title">Detection flags</span>
                <span class="flag-count" id="flag-count"></span>
            </div>
            <div id="flags" class="flags-list"></div>
            <button class="show-more" id="show-more" style="display:none">Show all flags</button>
        </section>

        <!-- ── Report CTA ──────────────────────────────────── -->
        <button class="report-btn" id="report-btn" style="display:none">
            <svg viewBox="0 0 20 20" fill="none" class="report-icon">
                <path d="M4 4h7l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V5a1 1 0 011-1z"
                      stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M11 4v4h4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span id="report-btn-label">Generate Security Report</span>
        </button>

        <footer class="footer-line">
            <span class="status-dot"></span>
            Real-time protection active
        </footer>

    </div>

    <!-- ── Settings panel ─────────────────────────────────── -->
    <div id="view-settings" class="settings-panel" aria-hidden="true">

        <header class="header">
            <button id="settings-back" class="icon-btn back-btn" aria-label="Back">
                <svg class="btn-icon" viewBox="0 0 20 20" fill="none">
                    <path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.4"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <span class="brand-name">Site Lists</span>
            <div style="width:28px"></div>
        </header>

        <div class="tabs">
            <button class="tab active" data-tab="whitelist">
                <svg viewBox="0 0 14 14" fill="none" class="tab-icon">
                    <path d="M7 1L1.5 3.25v3C1.5 9.5 3.917 12.083 7 12.833 10.083 12.083 12.5 9.5 12.5 6.25v-3L7 1z"
                          stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
                    <path d="M4.5 7l2 2 3-3" stroke="currentColor" stroke-width="1.2"
                          stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Trusted
            </button>
            <button class="tab" data-tab="blacklist">
                <svg viewBox="0 0 14 14" fill="none" class="tab-icon">
                    <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M4.5 4.5l5 5M9.5 4.5l-5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                </svg>
                Blocked
            </button>
        </div>

        <div class="tab-panel active" id="tab-whitelist">
            <p class="tab-desc">Domains you trust completely — all detection checks are skipped.</p>
            <div class="add-row">
                <input id="whitelist-input" class="domain-input" type="text"
                       placeholder="example.com" autocomplete="off" spellcheck="false"/>
                <button class="add-btn trust-add" id="whitelist-add">Add</button>
            </div>
            <p class="add-hint" id="whitelist-hint"></p>
            <div class="list-wrap" id="whitelist-list"></div>
        </div>

        <div class="tab-panel" id="tab-blacklist">
            <p class="tab-desc">Domains you always want blocked, regardless of analysis.</p>
            <div class="add-row">
                <input id="blacklist-input" class="domain-input" type="text"
                       placeholder="example.com" autocomplete="off" spellcheck="false"/>
                <button class="add-btn block-add" id="blacklist-add">Add</button>
            </div>
            <p class="add-hint" id="blacklist-hint"></p>
            <div class="list-wrap" id="blacklist-list"></div>
        </div>

        <footer class="footer">
            <span id="sync-status">Loading...</span>
            <span id="list-counts"></span>
        </footer>

    </div>

</div>
<script src="popup.js"></script>
</body>
</html>
